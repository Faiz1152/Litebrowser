<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Litebrowser</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: black;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 80px;
}

.search-box {
    width: 60%;
    max-width: 600px;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    outline: none;
}

.shortcuts {
    margin-top: 40px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
}

.shortcut {
    background: #f2f2f2;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    border: 1px solid #ddd;
}

.add-btn {
    margin-top: 20px;
    padding: 8px 12px;
    border: 1px solid #aaa;
    background: white;
    border-radius: 6px;
    cursor: pointer;
}
</style>

</head>

<body>

<h2>Start</h2>

<div class="search-box">
    <input id="search" placeholder="Search or enter URL">
</div>

<button class="add-btn" onclick="addShortcut()">Add Shortcut</button>

<div class="shortcuts" id="shortcuts"></div>

<script>
// SEARCH BAR
document.getElementById("search").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let v = this.value;

        if (!v.startsWith("http")) {
            v = "https://www.google.com/search?q=" + v;
        }

        window.location.href = v;
    }
});

// SHORTCUT SYSTEM (stored in browser local storage)
let shortcuts = JSON.parse(localStorage.getItem("shortcuts") || "[]");

function renderShortcuts() {
    let box = document.getElementById("shortcuts");
    box.innerHTML = "";

    shortcuts.forEach(url => {
        let div = document.createElement("div");
        div.className = "shortcut";
        div.innerText = url.replace("https://", "").replace("http://", "");
        div.onclick = () => window.location.href = url;
        box.appendChild(div);
    });
}

function addShortcut() {
    let url = prompt("Enter website URL:");
    if (!url) return;

    if (!url.startsWith("http")) {
        url = "https://" + url;
    }

    shortcuts.push(url);
    localStorage.setItem("shortcuts", JSON.stringify(shortcuts));
    renderShortcuts();
}

renderShortcuts();
</script>

</body>
</html>

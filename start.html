<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LiteBrowser</title>
<style>
  :root{
    --bg:#ffffff; --text:#1a1a1a; --textDim:#6b6b6b; --card:#f4f4f6;
    --cardHover:#e9e9ec; --border:#e0e0e4; --accent:#0066cc;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;width:100%;
    font-family:"Segoe UI",system-ui,sans-serif;
    background:var(--bg);color:var(--text);overflow:hidden;
    transition:background .25s,color .25s;
  }
  body.dark{
    --bg:#18181a;--text:#e6e6e8;--textDim:#9a9a9e;--card:#242428;
    --cardHover:#2c2c31;--border:#3a3a3f;--accent:#3896ff;
  }
  #bgLayer{
    position:fixed;inset:0;background-size:cover;background-position:center;
    z-index:0;transition:opacity .3s;
  }
  #bgLayer.hasImage::after{
    content:"";position:absolute;inset:0;
    background:rgba(0,0,0,0.28);backdrop-filter:blur(6px);
  }
  #wrap{
    position:relative;z-index:1;height:100%;width:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:28px;padding:20px;
  }
  #brand{font-size:26px;font-weight:600;letter-spacing:.5px;color:var(--text);opacity:.9;}
  #searchBox{
    width:min(560px,88vw);display:flex;align-items:center;gap:10px;
    background:var(--bg);border:1px solid var(--border);border-radius:26px;
    padding:12px 20px;box-shadow:0 4px 18px rgba(0,0,0,.12);
  }
  #searchBox svg{flex:none;opacity:.55;}
  #searchInput{
    flex:1;border:none;outline:none;background:transparent;
    font-size:16px;color:var(--text);
  }
  #shortcuts{
    display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:560px;
  }
  .shortcut{
    width:76px;display:flex;flex-direction:column;align-items:center;gap:6px;
    cursor:pointer;position:relative;
  }
  .shortcut .tile{
    width:52px;height:52px;border-radius:14px;background:var(--card);
    display:flex;align-items:center;justify-content:center;
    border:1px solid var(--border);transition:background .15s;overflow:hidden;
  }
  .shortcut .tile img{width:28px;height:28px;object-fit:contain;}
  .shortcut .tile .letter{
    font-size:18px;font-weight:600;color:var(--accent);
  }
  .shortcut:hover .tile{background:var(--cardHover);}
  .shortcut .label{
    font-size:12px;color:var(--textDim);max-width:76px;text-align:center;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .shortcut .remove{
    position:absolute;top:-6px;right:6px;width:18px;height:18px;
    border-radius:50%;background:#d33;color:#fff;font-size:11px;
    display:none;align-items:center;justify-content:center;cursor:pointer;
  }
  .shortcut:hover .remove{display:flex;}
  .shortcut.add .tile{font-size:24px;font-weight:400;color:var(--textDim);}
  #controls{
    position:fixed;bottom:18px;right:18px;display:flex;gap:10px;z-index:2;
  }
  #controls button{
    background:var(--card);color:var(--textDim);border:1px solid var(--border);
    border-radius:14px;padding:8px 14px;font-size:12px;cursor:pointer;
    transition:background .15s;
  }
  #controls button:hover{background:var(--cardHover);color:var(--text);}
  #fileInput{display:none;}
  #dialog{
    position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:5;
    display:none;align-items:center;justify-content:center;
  }
  #dialog.show{display:flex;}
  #dialogBox{
    background:var(--bg);border-radius:14px;padding:20px;width:280px;
    display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 30px rgba(0,0,0,.25);
  }
  #dialogBox input{
    padding:8px 10px;border-radius:8px;border:1px solid var(--border);
    background:transparent;color:var(--text);font-size:13px;
  }
  #dialogBox .row{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
  #dialogBox button{border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;}
  #dialogBox .save{background:var(--accent);color:#fff;}
  #dialogBox .cancel{background:var(--card);color:var(--text);}
</style>
</head>
<body>
<div id="bgLayer"></div>
<div id="wrap">
  <div id="brand">LiteBrowser</div>
  <div id="searchBox">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="7"></circle>
      <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
    </svg>
    <input id="searchInput" type="text" placeholder="Search Google or type a URL" autofocus>
  </div>
  <div id="shortcuts"></div>
</div>
<div id="controls">
  <button id="bgBtn">Change background</button>
  <button id="bgClearBtn">Clear background</button>
</div>
<input type="file" id="fileInput" accept="image/*">
<div id="dialog">
  <div id="dialogBox">
    <input id="dName" placeholder="Name">
    <input id="dUrl" placeholder="https://example.com">
    <div class="row">
      <button class="cancel" id="dCancel">Cancel</button>
      <button class="save" id="dSave">Save</button>
    </div>
  </div>
</div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────
// Always start light on fresh profile; only go dark if browser says so
function applyLBTheme(theme) {
  if (theme === 'dark') {
    document.body.classList.add('dark');
  } else {
    document.body.classList.remove('dark');
  }
  try { localStorage.setItem('lb_theme', theme); } catch(e){}
}
// Expose so main.cpp can call window.applyLBTheme('dark'/'light')
window.applyLBTheme = applyLBTheme;

// On load: default to light; browser will inject theme via ExecuteJavaScript
// after page loads if it has a stored preference
applyLBTheme('light');

// ── Background ─────────────────────────────────────────────────────────────
const bgLayer = document.getElementById('bgLayer');

function applyLBBackground(dataUrl) {
  if (!dataUrl) return;
  bgLayer.style.backgroundImage = 'url(' + dataUrl + ')';
  bgLayer.classList.add('hasImage');
  try { localStorage.setItem('lb_bg', dataUrl); } catch(e){}
}
window.applyLBBackground = applyLBBackground;

// Restore from localStorage on load (fallback if browser doesn't inject)
try {
  const stored = localStorage.getItem('lb_bg');
  if (stored) applyLBBackground(stored);
} catch(e){}

// ── Shortcuts ──────────────────────────────────────────────────────────────
const DEFAULT_SHORTCUTS = [
  {name:'YouTube', url:'https://www.youtube.com'},
  {name:'Gmail',   url:'https://mail.google.com'},
  {name:'GitHub',  url:'https://github.com'},
];

function load(key, fallback){
  try { const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }
  catch(e){ return fallback; }
}
function save(key,val){ try{localStorage.setItem(key,JSON.stringify(val));}catch(e){} }

let shortcuts = load('lb_shortcuts', DEFAULT_SHORTCUTS);

function getDomain(url){
  try { return new URL(url).hostname; } catch(e){ return ''; }
}
function faviconUrl(url){
  const domain = getDomain(url);
  if (!domain) return '';
  return 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=32';
}
function initials(name){
  const parts=name.trim().split(/\s+/);
  if(!parts.length||!parts[0]) return '?';
  return (parts[0][0]+(parts[1]?parts[1][0]:'')).toUpperCase();
}

function renderShortcuts(){
  const el=document.getElementById('shortcuts');
  el.innerHTML='';
  shortcuts.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='shortcut';
    const fav=faviconUrl(s.url);
    const iconHtml = fav
      ? `<img src="${fav}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt="">`
        + `<span class="letter" style="display:none">${initials(s.name)}</span>`
      : `<span class="letter">${initials(s.name)}</span>`;
    d.innerHTML=`
      <div class="remove" data-i="${i}">✕</div>
      <div class="tile">${iconHtml}</div>
      <div class="label">${s.name}</div>
    `;
    d.addEventListener('click',(e)=>{
      if(e.target.classList.contains('remove')||e.target.dataset.i!==undefined&&e.target.classList.contains('remove')){
        shortcuts.splice(i,1);save('lb_shortcuts',shortcuts);renderShortcuts();
        e.stopPropagation();return;
      }
      if(e.target.classList.contains('remove')){return;}
      window.location.href=s.url;
    });
    // fix: remove button is inside shortcut so we need correct delegation
    d.querySelector('.remove').addEventListener('click',(e)=>{
      shortcuts.splice(i,1);save('lb_shortcuts',shortcuts);renderShortcuts();
      e.stopPropagation();
    });
    el.appendChild(d);
  });
  const addTile=document.createElement('div');
  addTile.className='shortcut add';
  addTile.innerHTML=`<div class="tile">+</div><div class="label">Add</div>`;
  addTile.addEventListener('click',openDialog);
  el.appendChild(addTile);
}
renderShortcuts();

// ── Add shortcut dialog ────────────────────────────────────────────────────
const dialog=document.getElementById('dialog');
function openDialog(){
  document.getElementById('dName').value='';
  document.getElementById('dUrl').value='';
  dialog.classList.add('show');
  document.getElementById('dName').focus();
}
document.getElementById('dCancel').addEventListener('click',()=>dialog.classList.remove('show'));
document.getElementById('dSave').addEventListener('click',()=>{
  const name=document.getElementById('dName').value.trim();
  let url=document.getElementById('dUrl').value.trim();
  if(!name||!url) return;
  if(!/^https?:\/\//i.test(url)) url='https://'+url;
  shortcuts.push({name,url});
  save('lb_shortcuts',shortcuts);
  renderShortcuts();
  dialog.classList.remove('show');
});

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('keydown',(e)=>{
  if(e.key!=='Enter') return;
  const q=e.target.value.trim();
  if(!q) return;
  if(/^https?:\/\//i.test(q)||(!q.includes(' ')&&q.includes('.'))){
    window.location.href=/^https?:\/\//i.test(q)?q:'https://'+q;
  } else {
    window.location.href='https://www.google.com/search?q='+encodeURIComponent(q);
  }
});

// ── Background picker ──────────────────────────────────────────────────────
const fileInput=document.getElementById('fileInput');
document.getElementById('bgBtn').addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',()=>{
  const file=fileInput.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    applyLBBackground(reader.result);
  };
  reader.readAsDataURL(file);
});
document.getElementById('bgClearBtn').addEventListener('click',()=>{
  try{localStorage.removeItem('lb_bg');}catch(e){}
  bgLayer.style.backgroundImage='';
  bgLayer.classList.remove('hasImage');
});
</script>
</body>
</html>
